name: Live OHLCV Feed

permissions:
  contents: write

on:
  schedule:
    # Runs every minute
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  update-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install polars requests

      - name: Run Live Script
        run: python update_live_ohlcv.py

      - name: Commit Live Feed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "⚡ Live Feed Update"
          file_pattern: "data/live/*.csv" # Only commits live files!