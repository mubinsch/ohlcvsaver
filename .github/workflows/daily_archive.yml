name: Daily OHLCV Archive

permissions:
  contents: write

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC every day
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  save-daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install polars requests

      - name: Run Daily Script
        run: python save_daily_ohlcv.py

      - name: Commit Archive
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📅 Daily Archive Update"
          file_pattern: "data/archive/*.csv" # Only commits archive files!